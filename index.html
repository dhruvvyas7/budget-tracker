<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Dhruv</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #232220;
    --border: #2e2c29;
    --text: #f0ede8;
    --muted: #7a776f;
    --accent: #e8c87a;
    --accent-dim: rgba(232,200,122,0.10);
    --green: #7ec8a0;
    --green-dim: rgba(126,200,160,0.10);
    --red: #e87a7a;
    --red-dim: rgba(232,122,122,0.10);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
  }

  header {
    width: 100%; max-width: 520px;
    padding: 44px 0 28px;
  }

  .logo-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-left: 48px;
  }

  /* API Key section */
  .key-section {
    width: 100%; max-width: 520px;
    margin-bottom: 20px;
  }

  .key-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 8px 0;
    user-select: none;
  }

  .key-toggle:hover { color: var(--text); }

  .key-toggle .arrow {
    transition: transform 0.2s;
    font-size: 10px;
  }

  .key-toggle.open .arrow { transform: rotate(90deg); }

  .key-fields {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 4px;
  }

  .key-fields.visible { display: flex; }

  .key-fields input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .key-fields input:focus { border-color: var(--accent); }
  .key-fields input::placeholder { color: var(--muted); }

  .btn-save {
    background: var(--accent);
    color: #1a1610;
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-start;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }

  .key-status {
    font-size: 12px;
    padding: 4px 0;
  }

  .key-status.ok { color: var(--green); }
  .key-status.missing { color: var(--accent); }

  /* Cards */
  .card {
    width: 100%; max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Drop zone */
  #drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  #drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  .drop-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .drop-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .drop-sub { font-size: 12px; color: var(--muted); }

  /* File preview */
  #file-preview {
    display: none;
    margin-top: 12px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 11px 14px;
    align-items: center;
    gap: 10px;
  }

  #file-preview .file-icon { font-size: 20px; }
  #file-preview .file-name { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #file-preview .file-remove { cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; transition: color 0.15s; }
  #file-preview .file-remove:hover { color: var(--red); }

  /* Extract button */
  #btn-extract {
    display: none;
    width: 100%;
    margin-top: 10px;
    background: var(--accent-dim);
    border: 1px solid rgba(232,200,122,0.2);
    color: var(--accent);
    border-radius: 10px;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  #btn-extract:hover { background: rgba(232,200,122,0.18); }
  #btn-extract:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  #extract-status {
    display: none;
    margin-top: 10px;
    padding: 10px 13px;
    border-radius: 10px;
    font-size: 13px;
    align-items: center;
    gap: 8px;
  }

  #extract-status.loading { display: flex; background: var(--surface2); color: var(--muted); }
  #extract-status.success { display: flex; background: var(--green-dim); color: var(--green); border: 1px solid rgba(126,200,160,0.2); }
  #extract-status.error   { display: flex; background: var(--red-dim); color: var(--red); border: 1px solid rgba(232,122,122,0.2); }

  .spinner {
    width: 13px; height: 13px;
    border: 2px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0;
    color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Amount input */
  .amount-wrap { position: relative; }
  .amount-wrap .currency {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 16px; pointer-events: none;
  }
  .amount-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px 13px 28px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
  }
  .amount-wrap input:focus { border-color: var(--accent); }
  .amount-wrap input::placeholder { color: var(--border); }

  /* Name / date */
  .name-date-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }

  .field-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }

  .field-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }

  /* Column buttons */
  .col-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .col-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    gap: 3px;
    text-align: left;
  }

  .col-btn:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .col-btn:active { transform: scale(0.97); }
  .col-btn.submitting { opacity: 0.45; pointer-events: none; }

  .col-btn .col-emoji { font-size: 20px; margin-bottom: 5px; display: block; }
  .col-btn .col-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .col-btn .col-hint { font-size: 11px; color: var(--muted); }

  /* Submit status */
  #submit-status {
    display: none;
    margin-top: 12px;
    padding: 10px 13px;
    border-radius: 10px;
    font-size: 13px;
    align-items: center;
    gap: 8px;
  }
  #submit-status.loading { display: flex; background: var(--surface2); color: var(--muted); }
  #submit-status.success { display: flex; background: var(--green-dim); color: var(--green); border: 1px solid rgba(126,200,160,0.2); }
  #submit-status.error   { display: flex; background: var(--red-dim); color: var(--red); border: 1px solid rgba(232,122,122,0.2); }

  /* History */
  #history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 13px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .history-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .history-name { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-col { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .history-amount { font-weight: 600; color: var(--accent); white-space: nowrap; }

  .empty-history { text-align: center; color: var(--muted); font-size: 13px; padding: 12px 0; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(90px);
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px; font-weight: 500;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error-toast { background: var(--red); color: #fff; }

  @media (max-width: 420px) {
    h1 { font-size: 22px; }
    .name-date-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">📊</div>
    <h1>Budget Dhruv</h1>
  </div>
  <p class="subtitle">Upload invoices · extract amounts · log to Google Sheets</p>
</header>

<!-- API Key section (collapsible) -->
<div class="key-section">
  <div class="key-toggle" id="key-toggle" onclick="toggleKeys()">
    <span class="arrow">▶</span>
    <span id="key-status-inline" class="key-status missing">⚙ API key required — tap to set up</span>
  </div>
  <div class="key-fields" id="key-fields">
    <input type="password" id="claude-key" placeholder="Claude API key  (sk-ant-...)" autocomplete="off">
    <button class="btn-save" onclick="saveKeys()">Save key</button>
  </div>
</div>

<!-- Invoice Card -->
<div class="card">
  <div class="card-title">Invoice</div>

  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*,.pdf" onchange="handleFile(this.files[0])">
    <span class="drop-icon">📄</span>
    <div class="drop-title">Drop invoice here</div>
    <div class="drop-sub">PDF or image — JPG, PNG, HEIC</div>
  </div>

  <div id="file-preview">
    <span class="file-icon" id="preview-icon">📄</span>
    <span class="file-name" id="preview-name"></span>
    <span class="file-remove" onclick="clearFile()">✕</span>
  </div>

  <div id="extract-status">
    <div class="spinner" id="extract-spinner"></div>
    <span id="extract-msg"></span>
  </div>

  <button id="btn-extract" onclick="extractAmount()">✨ Read amount from invoice</button>

  <div class="divider">or enter manually</div>

  <div class="amount-wrap">
    <span class="currency">$</span>
    <input type="number" id="amount-input" placeholder="0.00" step="0.01" min="0">
  </div>

  <div class="name-date-row">
    <div>
      <div class="field-label">Description</div>
      <input type="text" class="field-input" id="name-input" placeholder="e.g. Grocery run">
    </div>
    <div>
      <div class="field-label">Date</div>
      <input type="date" class="field-input" id="date-input">
    </div>
  </div>
</div>

<!-- Column buttons -->
<div class="card">
  <div class="card-title">Add to column</div>
  <div class="col-grid">
    <button class="col-btn" onclick="addToSheet('Fixed necessary', 'C')">
      <span class="col-emoji">🔒</span>
      <span class="col-name">Fixed necessary</span>
      <span class="col-hint">Rent, subscriptions</span>
    </button>
    <button class="col-btn" onclick="addToSheet('Unfixed necessary', 'D')">
      <span class="col-emoji">🛒</span>
      <span class="col-name">Unfixed necessary</span>
      <span class="col-hint">Groceries, transport</span>
    </button>
    <button class="col-btn" onclick="addToSheet('Food/Eat out', 'E')">
      <span class="col-emoji">🍽️</span>
      <span class="col-name">Food / Eat out</span>
      <span class="col-hint">Restaurants, takeout</span>
    </button>
    <button class="col-btn" onclick="addToSheet('Misc', 'F')">
      <span class="col-emoji">📦</span>
      <span class="col-name">Misc</span>
      <span class="col-hint">Everything else</span>
    </button>
  </div>
  <div id="submit-status">
    <div class="spinner" id="submit-spinner"></div>
    <span id="submit-msg"></span>
  </div>
</div>

<!-- History -->
<div class="card">
  <div class="card-title">This session</div>
  <div id="history-list">
    <div class="empty-history">Nothing logged yet</div>
  </div>
</div>

<div id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby2-lhPzxt7D5_1vytGS8zT6PLOPFBKE86RumMagLnCg_3DSZL7lcZlhb3tGUewGSwNyQ/exec';

let currentFile = null;
let currentFileData = null;

// Set today's date
document.getElementById('date-input').value = new Date().toISOString().split('T')[0];

// Load saved key on startup
window.addEventListener('load', () => {
  const ck = localStorage.getItem('claude_key');
  if (ck) {
    document.getElementById('claude-key').value = ck;
    setKeyStatus(true);
  } else {
    setKeyStatus(false);
  }
});

function setKeyStatus(ok) {
  const el = document.getElementById('key-status-inline');
  if (ok) {
    el.textContent = '✓ Claude API key saved';
    el.className = 'key-status ok';
    document.getElementById('key-fields').classList.remove('visible');
    document.getElementById('key-toggle').classList.remove('open');
  } else {
    el.textContent = '⚙ Claude API key required — tap to set up';
    el.className = 'key-status missing';
  }
}

function toggleKeys() {
  const fields = document.getElementById('key-fields');
  const toggle = document.getElementById('key-toggle');
  const isOpen = fields.classList.contains('visible');
  fields.classList.toggle('visible', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function saveKeys() {
  const ck = document.getElementById('claude-key').value.trim();
  if (!ck) { showToast('Enter your Claude API key', true); return; }
  localStorage.setItem('claude_key', ck);
  setKeyStatus(true);
  showToast('Key saved ✓');
}

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  currentFile = file;
  const ext = file.name.split('.').pop().toLowerCase();
  document.getElementById('preview-icon').textContent = ext === 'pdf' ? '📄' : '🖼️';
  document.getElementById('preview-name').textContent = file.name;
  document.getElementById('file-preview').style.display = 'flex';
  document.getElementById('btn-extract').style.display = 'block';
  document.getElementById('drop-zone').style.display = 'none';
  setExtractStatus('', '');

  const reader = new FileReader();
  reader.onload = e => { currentFileData = e.target.result.split(',')[1]; };
  reader.readAsDataURL(file);
}

function clearFile() {
  currentFile = null; currentFileData = null;
  document.getElementById('file-preview').style.display = 'none';
  document.getElementById('btn-extract').style.display = 'none';
  document.getElementById('drop-zone').style.display = 'block';
  document.getElementById('file-input').value = '';
  setExtractStatus('', '');
}

function setExtractStatus(type, msg) {
  const el = document.getElementById('extract-status');
  if (!type) { el.style.display = 'none'; return; }
  el.className = type;
  el.style.display = 'flex';
  document.getElementById('extract-msg').textContent = msg;
  document.getElementById('extract-spinner').style.display = type === 'loading' ? 'block' : 'none';
}

function setSubmitStatus(type, msg) {
  const el = document.getElementById('submit-status');
  if (!type) { el.style.display = 'none'; return; }
  el.className = type;
  el.style.display = 'flex';
  document.getElementById('submit-msg').textContent = msg;
  document.getElementById('submit-spinner').style.display = type === 'loading' ? 'block' : 'none';
}

async function extractAmount() {
  const claudeKey = localStorage.getItem('claude_key');
  if (!claudeKey) { showToast('Save your Claude API key first', true); return; }
  if (!currentFileData) { showToast('No file loaded', true); return; }

  setExtractStatus('loading', 'Reading invoice with Claude AI…');
  document.getElementById('btn-extract').disabled = true;

  try {
    const ext = currentFile.name.split('.').pop().toLowerCase();
    const isPDF = ext === 'pdf';
    const mediaType = isPDF ? 'application/pdf' : (currentFile.type || 'image/jpeg');

    const contentBlock = isPDF
      ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: currentFileData } }
      : { type: 'image', source: { type: 'base64', media_type: mediaType, data: currentFileData } };

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: [
            contentBlock,
            { type: 'text', text: 'Look at this invoice or receipt. Find the final total amount to pay. Reply with ONLY the number — no currency symbol, no words, no explanation. Example reply: 42.50' }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text.trim().replace(/[^0-9.]/g, '');
    const amount = parseFloat(raw);
    if (isNaN(amount)) throw new Error('Could not find an amount — try entering manually');

    document.getElementById('amount-input').value = amount.toFixed(2);
    setExtractStatus('success', `Found $${amount.toFixed(2)} — confirm or edit, then pick a column ↓`);
  } catch (err) {
    setExtractStatus('error', err.message || 'Failed to read invoice');
  }

  document.getElementById('btn-extract').disabled = false;
}

async function addToSheet(colName, colLetter) {
  const amount = parseFloat(document.getElementById('amount-input').value);
  if (!amount || amount <= 0) { showToast('Enter a valid amount first', true); return; }

  const name = document.getElementById('name-input').value.trim() || '—';
  const date = document.getElementById('date-input').value || new Date().toISOString().split('T')[0];

  document.querySelectorAll('.col-btn').forEach(b => b.classList.add('submitting'));
  setSubmitStatus('loading', `Adding to ${colName}…`);

  try {
    const payload = { name, date, amount, col: colLetter };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // no-cors means we can't read the response, but if no error thrown it worked
    addHistory(name, colName, amount);
    setSubmitStatus('success', `Added $${amount.toFixed(2)} to "${colName}" ✓`);
    showToast(`$${amount.toFixed(2)} → ${colName} ✓`);

    // Reset
    document.getElementById('amount-input').value = '';
    document.getElementById('name-input').value = '';
    setExtractStatus('', '');
    clearFile();

    setTimeout(() => setSubmitStatus('', ''), 4000);
  } catch (err) {
    setSubmitStatus('error', err.message || 'Failed — check your connection');
    showToast('Failed to write to sheet', true);
  }

  document.querySelectorAll('.col-btn').forEach(b => b.classList.remove('submitting'));
}

function addHistory(name, col, amount) {
  const list = document.getElementById('history-list');
  const empty = list.querySelector('.empty-history');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-dot"></div>
    <span class="history-name">${esc(name)}</span>
    <span class="history-col">${esc(col)}</span>
    <span class="history-amount">$${amount.toFixed(2)}</span>
  `;
  list.prepend(item);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error-toast show' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}
</script>
</body>
</html>
